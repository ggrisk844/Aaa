<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amtali Govt. Technical School & College</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Outfit', 'sans-serif'],
            },
            colors: {
              primary: {
                50: '#f0fdf4',
                100: '#dcfce7',
                200: '#bbf7d0',
                300: '#86efac',
                400: '#4ade80',
                500: '#22c55e',
                600: '#16a34a',
                700: '#15803d',
                800: '#166534',
                900: '#14532d',
                950: '#052e16',
              },
              secondary: {
                50: '#eef2ff',
                100: '#e0e7ff',
                200: '#c7d2fe',
                300: '#a5b4fc',
                400: '#818cf8',
                500: '#6366f1',
                600: '#4f46e5',
                700: '#4338ca',
                800: '#3730a3',
                900: '#312e81',
                950: '#1e1b4b',
              }
            },
            animation: {
                'float': 'float 10s infinite ease-in-out',
                'spin-slow': 'spin 10s linear infinite',
                'marquee': 'marquee 25s linear infinite',
            },
            keyframes: {
                float: {
                    '0%, 100%': { transform: 'translateY(0) scale(1)' },
                    '50%': { transform: 'translateY(-20px) scale(1.05)' },
                },
                marquee: {
                    '0%': { transform: 'translateX(0%)' },
                    '100%': { transform: 'translateX(-100%)' },
                }
            }
          }
        }
      }
    </script>
    <style>
      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
      
      .perspective-1000 { perspective: 1000px; }

      /* 3D Button Effect */
      .btn-3d {
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        transform: translateY(0);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      }
      .btn-3d:hover {
        transform: translateY(-4px) scale(1.02);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      }
      .btn-3d:active {
        transform: translateY(-1px);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      }

      /* 3D Card Effect */
      .card-3d {
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        backface-visibility: hidden;
        transform-style: preserve-3d;
      }
      .card-3d:hover {
        transform: translateY(-10px) rotate(1deg); /* Slight rotation on hover */
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); /* Deeper shadow */
        z-index: 10;
      }

      /* Unique Glow Colors for Cards */
      .glow-blue:hover { box-shadow: 0 25px 50px -12px rgba(59, 130, 246, 0.4); border-color: rgba(59, 130, 246, 0.3); }
      .glow-green:hover { box-shadow: 0 25px 50px -12px rgba(34, 197, 94, 0.4); border-color: rgba(34, 197, 94, 0.3); }
      .glow-purple:hover { box-shadow: 0 25px 50px -12px rgba(168, 85, 247, 0.4); border-color: rgba(168, 85, 247, 0.3); }
      .glow-amber:hover { box-shadow: 0 25px 50px -12px rgba(245, 158, 11, 0.4); border-color: rgba(245, 158, 11, 0.3); }
      .glow-rose:hover { box-shadow: 0 25px 50px -12px rgba(244, 63, 94, 0.4); border-color: rgba(244, 63, 94, 0.3); }
      .glow-indigo:hover { box-shadow: 0 25px 50px -12px rgba(99, 102, 241, 0.4); border-color: rgba(99, 102, 241, 0.3); }

      /* 3D Icon Lift */
      .icon-3d { transition: transform 0.3s ease; }
      .parent-hover:hover .icon-3d { transform: translateZ(20px) scale(1.1); }
      
      /* Neon Glow Text */
      .text-glow { text-shadow: 0 0 10px rgba(34, 197, 94, 0.5); }
      
      /* Glass Panel */
      .glass-panel {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
      .dark .glass-panel {
        background: rgba(17, 24, 39, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      /* Animated Underline Link */
      .link-3d { position: relative; }
      .link-3d::after {
        content: '';
        position: absolute;
        width: 0;
        height: 2px;
        bottom: -2px;
        left: 0;
        background-color: currentColor;
        transition: width 0.3s ease;
      }
      .link-3d:hover::after { width: 100%; }

      /* Back Glow Backdrop */
      .back-glow {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
      }
      .glow-blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.4;
      }
    </style>

{
  "imports": {

}
</script>
